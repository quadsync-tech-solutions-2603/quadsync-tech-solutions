<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Favicon and Logo -->
    <link rel="icon" href="%PUBLIC_URL%/assets/images/Logo.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/assets/images/Logo.png" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="QuadSync Tech Solutions - Synchronizing Innovations with Success" />
    <meta property="og:title" content="QuadSync Tech Solutions" />
    <meta property="og:description" content="Synchronizing Innovations with Success" />
    <meta property="og:image" content="%PUBLIC_URL%/assets/images/Logo.png" />
    <meta property="og:url" content="https://quadsyntechsolutions.in" />
    <meta name="twitter:card" content="summary_large_image" />
    
    <!-- Preload Logo for faster loading -->
    <link rel="preload" href="%PUBLIC_URL%/assets/images/Logo.png" as="image" />
    
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Custom Styles -->
    <style>
      :root {
        --primary: #3498db;
        --secondary: #2c3e50;
        --accent: #2ecc71;
        --light: #f8f9fa;
        --dark: #2c3e50;
        --gray: #6c757d;
        --light-gray: #e9ecef;
        --gradient: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
        --premium-gradient: linear-gradient(135deg, #ec4899 0%, #d946ef 100%);
        --success: #28a745;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        color: var(--dark);
      }
      
      /* Logo in Header */
      .logo-container {
        max-width: 200px;
        height: 60px;
        display: flex;
        align-items: center;
      }
      
      .logo-img {
        height: 100%;
        width: auto;
        object-fit: contain;
      }
      
      /* Logo in Footer */
      .footer-logo {
        max-width: 150px;
        height: auto;
        margin-bottom: 20px;
      }
      
      /* Hero Section with Background */
      .hero-section {
        min-height: 100vh;
        background: linear-gradient(rgba(44, 62, 80, 0.9), rgba(44, 62, 80, 0.8)), 
                    url('%PUBLIC_URL%/assets/images/Hero.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: white;
        display: flex;
        align-items: center;
      }
      
      /* Smooth Scrolling */
      html {
        scroll-behavior: smooth;
      }
      
      /* Button Styles */
      .btn-primary {
        background: var(--gradient);
        border: none;
        padding: 12px 30px;
        border-radius: 8px;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
      }
      
      .btn-secondary {
        background: var(--dark);
        border: none;
        padding: 12px 30px;
        border-radius: 8px;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      
      .btn-secondary:hover {
        background: var(--secondary);
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(44, 62, 80, 0.3);
      }
      
      /* Section Spacing */
      section {
        padding: 80px 0;
      }
      
      /* Card Hover Effects */
      .card-hover {
        transition: all 0.3s ease;
      }
      
      .card-hover:hover {
        transform: translateY(-10px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      }
      
      /* Responsive Adjustments */
      @media (max-width: 768px) {
        .hero-section {
          min-height: 80vh;
          background-attachment: scroll;
        }
        
        section {
          padding: 60px 0;
        }
        
        .logo-container {
          max-width: 150px;
          height: 50px;
        }
      }
    </style>
    
    <title>QuadSync Tech Solutions | Synchronizing Innovations with Success</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- AOS Animation -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        AOS.init({
          duration: 1000,
          once: true,
          offset: 100
        });
        
        // Smooth scroll for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
          anchor.addEventListener('click', function (e) {
            e.preventDefault();
            const targetId = this.getAttribute('href');
            if (targetId === '#') return;
            
            const targetElement = document.querySelector(targetId);
            if (targetElement) {
              window.scrollTo({
                top: targetElement.offsetTop - 80,
                behavior: 'smooth'
              });
            }
          });
        });
        
        // Add active class to nav links on scroll
        const sections = document.querySelectorAll('section[id]');
        const navLinks = document.querySelectorAll('.nav-link');
        
        function highlightNavLink() {
          let scrollY = window.pageYOffset;
          
          sections.forEach(section => {
            const sectionHeight = section.offsetHeight;
            const sectionTop = section.offsetTop - 100;
            const sectionId = section.getAttribute('id');
            const navLink = document.querySelector(`.nav-link[href="#${sectionId}"]`);
            
            if (scrollY > sectionTop && scrollY <= sectionTop + sectionHeight) {
              navLink?.classList.add('active');
            } else {
              navLink?.classList.remove('active');
            }
          });
        }
        
        window.addEventListener('scroll', highlightNavLink);
      });
    </script>
  </body>
</html>
